<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Pagamento - Sistema RH</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background-color:#fffff0;
min-height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:linear-gradient(135deg,#000435 0%,#001a6e 100%);
color:white;
padding:30px 20px;
text-align:center;
box-shadow:0 4px 12px rgba(0,4,53,0.3);
}

.header h1{
font-size:2.2rem;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
}

.container{
max-width:700px;
margin:40px auto;
padding:0 20px;
flex:1;
}

.card{
background:white;
border-radius:15px;
padding:40px;
box-shadow:0 5px 20px rgba(0,4,53,0.1);
}

.btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 28px;
font-size:16px;
font-weight:600;
text-decoration:none;
border-radius:10px;
transition:all 0.3s ease;
cursor:pointer;
border:none;
}

.btn-primary{
background:linear-gradient(135deg,#000435 0%,#0066cc 100%);
color:white;
}

.btn-secondary{
background:linear-gradient(135deg,#6c757d 0%,#495057 100%);
color:white;
}

.form-group{
margin-bottom:25px;
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
color:#000435;
display:flex;
align-items:center;
gap:8px;
}

select,
input{
width:100%;
padding:15px;
font-size:16px;
border:2px solid #e0e0e0;
border-radius:10px;
}

.form-actions{
display:flex;
gap:15px;
margin-top:35px;
}

.form-actions .btn{
flex:1;
justify-content:center;
}

.info-box{
background:linear-gradient(135deg,#e7f3ff 0%,#d0e8ff 100%);
border-left:4px solid #0066cc;
padding:20px;
margin-top:25px;
border-radius:10px;
}

.footer{
background:#000435;
color:white;
text-align:center;
padding:20px;
margin-top:auto;
}
</style>

</head>

<body>

<div class="header">
<h1>
<i class="bi bi-receipt"></i>
Registrar Pagamento
</h1>
<p>Preencha os dados para registrar o pagamento</p>
</div>

<div class="container">

<a th:href="@{/folhapagamento}" class="btn btn-secondary">
<i class="bi bi-arrow-left-circle"></i>
Voltar à Lista
</a>

<div class="card">

<form th:action="@{/folhapagamento/cadastrar}" method="post">

<div class="form-group">
<label>
<i class="bi bi-person"></i>
Funcionário
</label>

<select name="funcionarioId" required>
<option value="">Selecione um funcionário...</option>

<option th:each="f : ${funcionarios}" 
        th:value="${f.id}" 
        th:text="'ID: ' + ${f.id} + ' - ' + ${f.nome}">
</option>

</select>
</div>


<div class="form-group">
<label>
<i class="bi bi-currency-dollar"></i>
Salário Bruto (MTN)
</label>

<input type="number"
name="salarioBruto"
step="0.01"
min="0"
required>
</div>


<div class="form-group">
<label>
<i class="bi bi-cash-stack"></i>
Comissão (MTN)
</label>

<input type="number"
name="comissao"
step="0.01"
min="0"
placeholder="Ex: 500.00">
</div>


<div class="form-group">
<label>
<i class="bi bi-calendar-event"></i>
Data do Pagamento
</label>

<input type="date"
name="dataPagamento"
required>
</div>


<div class="form-actions">

<button type="submit" class="btn btn-primary">
<i class="bi bi-check-circle"></i>
Registrar Pagamento
</button>

<a th:href="@{/folhapagamento}" class="btn btn-secondary">
<i class="bi bi-x-circle"></i>
Cancelar
</a>

</div>

</form>


<div class="info-box">

<p><strong>Informações:</strong></p>

<p>• O imposto será calculado automaticamente</p>

<p>• O salário líquido = salário bruto + comissão − imposto</p>

<p>• A comissão é opcional</p>

</div>

</div>

</div>

<div class="footer">
<p>&copy; 2026 Sistema RH</p>
</div>

</body>
</html>
