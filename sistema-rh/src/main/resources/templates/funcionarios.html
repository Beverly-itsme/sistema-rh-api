<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funcionários - Sistema RH</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffff0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #000435 0%, #001a6e 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(0, 4, 53, 0.3);
        }
        
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 4, 53, 0.15);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #000435 0%, #0066cc 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 4, 53, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
        }
        
        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(108, 117, 125, 0.3);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #ffb300 100%);
            color: #000435;
        }
        
        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 193, 7, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.3);
        }
        
        .btn-sm {
            padding: 8px 14px;
            font-size: 14px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 4, 53, 0.1);
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        thead {
            background: linear-gradient(135deg, #000435 0%, #001a6e 100%);
            color: white;
        }
        
        th {
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
            font-size: 1rem;
        }
        
        tbody tr {
            transition: all 0.3s ease;
        }
        
        tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 2px 8px rgba(0, 4, 53, 0.1);
        }
        
        tbody tr:nth-child(even) {
            background-color: #fafafa;
        }
        
        tbody tr:nth-child(even):hover {
            background-color: #f0f0f0;
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1rem;
        }
        
        .footer {
            background-color: #000435;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
        
        .footer p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.6rem;
                flex-direction: column;
            }
            
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <i class="bi bi-people-fill"></i>
            Lista de Funcionários
        </h1>
        <p>Gerencie os colaboradores da empresa</p>
    </div>
    
    <div class="container">
        <div class="action-bar">
            <a th:href="@{/menu}" class="btn btn-secondary">
                <i class="bi bi-arrow-left-circle"></i>
                Voltar ao Menu
            </a>
            <a th:href="@{/funcionarios/cadastrar}" class="btn btn-primary">
                <i class="bi bi-person-plus-fill"></i>
                Cadastrar Novo Funcionário
            </a>
        </div>
        
        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="bi bi-hash"></i> ID</th>
                            <th><i class="bi bi-person"></i> Nome</th>
                            <th><i class="bi bi-briefcase"></i> Cargo</th>
                            <th><i class="bi bi-currency-dollar"></i> Salário</th>
                            <th style="text-align: center;"><i class="bi bi-gear"></i> Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(funcionarios)}">
                            <td colspan="5" class="empty-message">
                                <i class="bi bi-inbox" style="font-size: 2rem; display: block; margin-bottom: 10px;"></i>
                                Nenhum funcionário cadastrado.
                            </td>
                        </tr>
                        <tr th:each="f : ${funcionarios}" th:unless="${#lists.isEmpty(funcionarios)}">
                            <td th:text="${f.id}"></td>
                            <td th:text="${f.nome}"></td>
                            <td th:text="${f.cargo}"></td>
                            <td th:text="'MTN ' + ${#numbers.formatDecimal(f.salario, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td style="text-align: center;">
                                <div style="display: flex; gap: 8px; justify-content: center;">
                                    <a th:href="@{/funcionarios/editar/{id}(id=${f.id})}" 
                                       class="btn btn-sm btn-warning" 
                                       title="Editar"
                                       style="padding: 8px 14px; font-size: 14px;">
                                        <i class="bi bi-pencil-square"></i>
                                        <span style="margin-left: 5px;">Editar</span>
                                    </a>
                                    <a href="#" 
                                       th:onclick="|if(confirm('Tem certeza que deseja excluir este funcionário?')) { window.location.href='@{/funcionarios/excluir/{id}(id=${f.id})}'; } return false;|" 
                                       class="btn btn-sm btn-danger" 
                                       title="Excluir"
                                       style="padding: 8px 14px; font-size: 14px;">
                                        <i class="bi bi-trash"></i>
                                        <span style="margin-left: 5px;">Excluir</span>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>&copy; 2026 Sistema RH - Todos os direitos reservados</p>
    </div>
</body>
</html>
